apiVersion: apps/v1
kind: Deployment
metadata:
  name: vclip
  labels:
    app: vclip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vclip
  template:
    metadata:
      labels:
        app: vclip
    spec:
      imagePullSecrets:
        - name: registry-s8njee-pull
      containers:
        - name: vclip
          image: registry.s8njee.com/vclip:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: VCLIP_OUTPUT
              value: "/vclip"
          volumeMounts:
            - name: vclip-output
              mountPath: /vclip
            - name: anime
              mountPath: /mnt/raid6/anime
            - name: movies
              mountPath: /mnt/raid6/movies
            - name: tv
              mountPath: /mnt/raid6/tv
            - name: documentary
              mountPath: /mnt/raid6/documentary
      volumes:
        - name: vclip-output
          hostPath:
            path: /mnt/raid6/vclip-output # Or whatever common location you want on freya for saved clips
            type: DirectoryOrCreate
        - name: anime
          hostPath:
            path: /mnt/raid6/anime
            type: DirectoryOrCreate
        - name: movies
          hostPath:
            path: /mnt/raid6/movies
            type: DirectoryOrCreate
        - name: tv
          hostPath:
            path: /mnt/raid6/tv
            type: DirectoryOrCreate
        - name: documentary
          hostPath:
            path: /mnt/raid6/documentary
            type: DirectoryOrCreate
